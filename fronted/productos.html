<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Productos - Sistema de Inventario</title>
    <link rel='stylesheet' href='./css/estilos1.css'>
</head>
<body class="body_c">

    <!-- Botón hamburguesa -->
    <button class="burguer" id="burguer">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Menú de navegación -->
    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="productos.html" class="active">Productos</a></li>
            <li><a href="categorias.html">Categorías</a></li>
            <li><a href="perfil.html">Mi Perfil</a></li>
            <li><a href="#" id="logoutLink">Cerrar sesión</a></li>
        </ul>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container-c"> <!-- 🔥 en vez de container -->
        <h2>Gestión de Productos</h2>

        <!-- Formulario -->
        <div class="form-container">
            <h3 id="formTitle">Agregar Producto</h3>

            <form id="productoForm">

                <input type="hidden" id="productoId">

                <!-- fila 1 -->
                <div class="form-group">
                    <label class="c">Nombre del producto:</label>
                    <input type="text" id="nombre" placeholder="Ej: Laptop HP" required>
                </div>

                <div class="form-group">
                    <label class="c">Categoría:</label>
                    <select id="categoria" class="input1">
                        <option value="">Seleccionar categoría...</option>
                    </select>
                </div>

                <!-- fila 2 -->
                <div class="form-group">
                    <label class="c">Cantidad (stock):</label>
                    <input type="number" id="cantidad" value="0" min="0">
                </div>

                <div class="form-group">
                    <label class="c">Precio de venta ($):</label>
                    <input type="number" id="precio" step="0.01" placeholder="0.00">
                </div>

                <!-- botones -->
                <div class="from-buttons"> <!-- 🔥 usas tu clase -->
                    <button type="submit" id="submitBtn">Crear Producto</button>
                    <button type="button" id="cancelBtn" style="display:none">Cancelar</button>
                </div>

            </form>
        </div>

        <!-- buscador -->
        <div class="form-container"> <!-- reutilizas estilo -->
            <input type="text" id="searchInput" placeholder="🔍 buscar producto..." class="input1">
            <input type="text" id="searchCategoria" placeholder="buscar por categoria..." class="input1">
        </div>

        <!-- tabla -->
        <div class="tabla-container">
            <h3>Lista de Productos</h3>

            <table id="productosTable" class="tabla">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="productosBody">
                    <tr><td colspan="7">Cargando productos...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="./javascripts/utils.js"></script>
    <script src="./javascripts/productos.js"></script>
</body>
</html>
